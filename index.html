<!DOCTYPE html>
<html>
<head>
    <title>Тест бота</title>
</head>
<body>
    <h1>Тест отправки сообщения в Telegram</h1>
    <button onclick="sendTest()">Отправить тест</button>
    <p id="result"></p>

    <script>
        function sendTest() {
            const BOT_TOKEN = "8946537004:AAGqZiirco4qn8DWgGY-mlLdooO1W_LGhqk";
            const SELLER_ID = "8173700385";
            const testText = "ТЕСТОВОЕ СООБЩЕНИЕ ОТ HTML";

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: SELLER_ID, text: testText })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById('result').innerHTML = '✅ Сообщение отправлено! Проверь Telegram.';
                } else {
                    document.getElementById('result').innerHTML = '❌ Ошибка: ' + data.description;
                }
            })
            .catch(e => {
                document.getElementById('result').innerHTML = '❌ Ошибка соединения: ' + e.message;
            });
        }
    </script>
</body>
</html>
