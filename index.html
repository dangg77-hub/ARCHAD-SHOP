<!DOCTYPE html>
<html lang="ru">
<head>

    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #fff;
            padding-bottom: 70px;
            overflow-x: hidden;
        }
        .spark {
            position: fixed;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #ff6666, #ff0000, #990000);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            animation: sparkFloat linear infinite;
        }
        @keyframes sparkFloat {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) translateX(50px) scale(0); opacity: 0; }
        }
        .header {
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 2px solid #ff0000;
        }
        .header h1 { font-size: 26px; letter-spacing: 3px; }
        .header h1 span { color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .delivery-time {
            background: #1a0000;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            color: #ff6666;
            border-bottom: 1px solid #ff0000;
        }
        .marquee {
            background: #0a0a0a;
            padding: 8px;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid #333;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 12s linear infinite;
            color: #ff4444;
            font-size: 13px;
            font-weight: bold;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000000;
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid #ff0000;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 12px;
        }
        .nav-item.active { background: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .nav-item span:first-child { font-size: 22px; display: block; }
        .nav-item span:last-child { font-size: 11px; }
        .sub-categories {
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
        }
        .sub-cat-btn {
            background: #1a1a1a;
            border: 1px solid #ff0000;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            color: white;
        }
        .sub-cat-btn.active { background: #ff0000; color: white; }
        .catalog {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            max-width: 600px;
            margin: 0 auto;
        }
        .product-card {
            background: linear-gradient(145deg, #141414 0%, #0a0a0a 100%);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-card:active { transform: scale(0.97); }
        .product-img {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }
        .product-info { padding: 10px; }
        .product-brand { font-size: 10px; color: #ff4444; font-weight: bold; }
        .product-title { font-size: 13px; font-weight: 600; margin: 5px 0; }
        .product-price { color: #ff0000; font-weight: bold; font-size: 18px; }
        .product-strength { font-size: 11px; color: #888; margin-top: 4px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a1a;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #ff0000;
            overflow: hidden;
        }
        .modal-img {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .modal-img img {
            width: 100%;

        }
        .modal-body { padding: 20px; }
        .modal-title { font-size: 20px; margin-bottom: 10px; }
        .modal-price { color: #ff0000; font-size: 26px; margin: 15px 0; }
        .modal-strength { color: #ffaa00; font-size: 14px; margin-bottom: 15px; }
        .flavor-select, .ohm-select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #ff0000;
            border-radius: 10px;
            margin: 10px 0;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .quantity-btn {
            background: #ff0000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 20px;
            color: white;
            cursor: pointer;
        }
        .quantity { font-size: 24px; font-weight: bold; }
        .add-to-cart {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            z-index: 2001;
        }
        .cart-icon {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #ff0000;
            width: 55px;
            height: 55px;
            border-radius: 28px;

            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,0,0,0.4);

        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: #ff0000;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .cart-page, .profile-page { padding: 20px; max-width: 600px; margin: 0 auto; }
        .cart-item {

            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;

        .cart-total {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 12px;
            text-align: center;
        }
        .cart-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;

            padding: 12px;
            border-radius: 12px;

            border-radius: 16px;
            padding: 25px;
            text-align: center;
        }
        .profile-stat {
            margin: 15px 0;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

        }

            localStorage.setItem(`stats_${userData.id || 'guest'}`, JSON.stringify(userStats));
            document.getElementById('ordersCount').innerText = userStats.ordersCount;
        }
        const products = [

            { id: "oggo_cherry", name: "CHERRY", brand: "OGGO", price: 15, img: "https://i.ibb.co/qMN089nF/zhidkost-oggo-cherry-sladkaya-vishnya-30ml-2-800x800-1.jpg", category: "liquid", strength: "20 мг", flavors: ["Кислая вишня", "Сладкая вишня"] },
            { id: "oggo_acid", name: "ACID", brand: "OGGO", price: 15, img: "https://i.ibb.co/wFspdZSq/Oggo-Salt-Yabloko-Zhvachka-750x0.jpg", category: "liquid", strength: "20 мг", flavors: ["Кислый лимонад", "Цитрусовый микс"] },
            { id: "oggo_volt", name: "Volt", brand: "OGGO", price: 17, img: "https://i.ibb.co/wFspdZSq/Oggo-Salt-Yabloko-Zhvachka-750x0.jpg", category: "liquid", strength: "20 мг", flavors: ["Энергетик", "Кола со льдом"] },
            { id: "podonki_malaysian", name: "MALAYSIAN ARCADE", brand: "PODONKI", price: 15, img: "https://i.ibb.co/NdqV33cG/image.png", category: "liquid", strength: "50 мг", flavors: ["Манго-маракуйя", "Ананас-кокос", "Клубника-арбуз"] },
            { id: "podonki_podgon", name: "PODGON", brand: "PODONKI", price: 13, img: "https://i.ibb.co/C5PyBCXf/image.jpg", category: "liquid", strength: "50 мг", flavors: ["Лимонный лед", "Мятная свежесть"] },
            { id: "podonki_isterika", name: "ISTERIKA", brand: "PODONKI", price: 15, img: "https://i.ibb.co/rKSWR2QF/image.png", category: "liquid", strength: "50 мг", flavors: ["Взрывная мята", "Ледяной виноград"] },
            { id: "hotspot", name: "DON'T Chew It", brand: "HOT SPOT", price: 15, img: "https://i.ibb.co/hRHwqJf6/Hotspot-DONT-Chew-IT-salt-30ml-marakujya.jpg", category: "liquid", strength: "50 мг", flavors: ["Жвачка арбузная", "Жвачка зелёное яблоко", "Жвачка ледяная вишня", "Жвачка ледяной виноград", "Жвачка маракуйя", "Жвачка персиковая"] },

            { id: "faff_premium", name: "premium", brand: "FAFF", price: 15, img: "https://i.ibb.co/78r48VT/faff.jpg", category: "liquid", strength: "50 мг", flavors: ["Клубничный пончик", "Ванильный крем"] },
            { id: "catswill_premium", name: "PREMIUM", brand: "CATSWILL", price: 20, img: "https://i.ibb.co/pBC6gH5W/catswill-prem.webp", category: "liquid", strength: "50 мг", flavors: ["Малиновый щербет", "Клубничный чизкейк"] },
            { id: "anarchy_v1", name: "АНАРХИЯ V1", brand: "АНАРХИЯ", price: 18, img: "https://i.ibb.co/ynDNtDfs/image.jpg", category: "liquid", strength: "70 мг", flavors: ["ЪУЪ", "Кем ты был, кем ты стал", "Как жить теперь"] },
            { id: "anarchy_v2", name: "АНАРХИЯ V2", brand: "АНАРХИЯ", price: 18, img: "https://i.ibb.co/ynDNtDfs/image.jpg", category: "liquid", strength: "70 мг", flavors: ["Да — мне нечего терять", "Реален только счёт за электричество", "То тут, то там сияет пустота", "Сердце твоё двулико"] },
            { id: "evil_monashka", name: "ЗЛАЯ МОНАШКА", brand: "ЗЛАЯ МОНАШКА", price: 18, img: "https://i.ibb.co/xt134dkw/Salt-2-HARD-30-ml.jpg", category: "liquid", strength: "70 мг", flavors: ["Доктор Пеппер черешня", "Энергетик Лед", "Энергетик Ежевика Лед", "Черника Лед", "Малина Ежевика Лед", "Клубника Арбуз Лед"] },
            { id: "xros", name: "XROS", brand: "VAPORESSO", price: 13, img: "", category: "coils", ohms: ["0.3Ω", "0.4Ω", "0.6Ω", "0.8Ω", "1.0Ω"] },
            { id: "barr", name: "BARR", brand: "BARR", price: 13, img: "", category: "coils", ohms: ["0.6Ω", "0.8Ω", "1.0Ω"] },
            { id: "vthru", name: "VTHRU", brand: "VTHRU", price: 13, img: "", category: "coils", ohms: ["0.5Ω", "0.6Ω", "0.8Ω"] },
            { id: "aegis_b", name: "AEGIS B-series", brand: "AEGIS", price: 13, img: "", category: "coils", ohms: ["0.15Ω", "0.2Ω", "0.3Ω", "0.4Ω"] },
            { id: "smoant_santi", name: "Santi / Charon Baby Plus / Knight 40", brand: "SMOANT", price: 13, img: "", category: "coils", ohms: ["0.2Ω", "0.3Ω", "0.4Ω", "0.6Ω"] },
            { id: "smoant_battlestar", name: "Battlestar Baby", brand: "SMOANT", price: 13, img: "", category: "coils", ohms: ["0.2Ω", "0.3Ω", "0.4Ω"] },
            { id: "smoant_pasito", name: "PASITO 2 / KNIGHT 80", brand: "SMOANT", price: 13, img: "", category: "coils", ohms: ["0.2Ω", "0.4Ω", "0.6Ω"] }
        ];
        let cart = [];
        let currentProduct = null;
        let currentQty = 1;
        let currentSubCategory = "all";
        function saveCart() {
            localStorage.setItem(`cart_${userData.id || 'guest'}`, JSON.stringify(cart));
            updateCartUI();
        }
        function loadCart() {
            let saved = localStorage.getItem(`cart_${userData.id || 'guest'}`);
            if (saved) cart = JSON.parse(saved);
            updateCartUI();
        }
        function addToCart(product, qty, flavorOrOhm, ohmValue) {
            let displayOption = "", cartKey = "";
            if (product.category === "coils") {
                if (!ohmValue) { alert('Выберите сопротивление!'); return; }
                displayOption = ohmValue;
                cartKey = `${product.id}_${ohmValue}`;
            } else {
                if (!flavorOrOhm && product.flavors && product.flavors.length > 0) { alert('Выберите вкус!'); return; }
                displayOption = flavorOrOhm;
                cartKey = `${product.id}_${flavorOrOhm || 'no_flavor'}`;
            }
            let existing = cart.find(i => i.cartKey === cartKey);
            if (existing) existing.qty += qty;
            else cart.push({ ...product, qty, selectedOption: displayOption, cartKey });
            saveCart();
            document.getElementById('productModal').classList.remove('active');
            if (tg) tg.HapticFeedback?.impactOccurred('light');
        }
        function removeFromCart(cartKey) {
            cart = cart.filter(i => i.cartKey !== cartKey);
            saveCart();
        }
        function clearCart() { if (confirm('Очистить корзину?')) { cart = []; saveCart(); } }
        function updateCartUI() {
            let totalQty = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartCount').innerText = totalQty;
            let cartList = document.getElementById('cartList');
            if (cart.length === 0) { cartList.innerHTML = '<p style="text-align:center; color:#888;">Корзина пуста</p>'; document.getElementById('cartTotal').innerHTML = ''; return; }
            cartList.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <strong>${item.emoji} ${item.brand} ${item.name}</strong><br>
                        <small>📦 ${item.selectedOption}</small><br>
                        <small>${item.strength ? `💪 ${item.strength} | ` : ''}${item.price} BYN × ${item.qty} = ${item.price * item.qty} BYN</small>
                    </div>
                    <button class="remove-item-btn" onclick="removeFromCart('${item.cartKey}')">🗑</button>
                </div>
            `).join('');
            let total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            document.getElementById('cartTotal').innerHTML = `💰 Итого: ${total} BYN`;
        }
        function renderCatalog() {
            let filtered = currentSubCategory === "all" ? products : products.filter(p => p.category === currentSubCategory);
            let container = document.getElementById('catalogPage');
            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProductModal('${p.id}')">
                    <div class="product-img">${p.img && p.img !== "" ? `<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='🍋'">` : `<span style="font-size:52px">${p.emoji}</span>`}</div>
                    <div class="product-info">
                        <div class="product-brand">${p.brand}</div>
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${p.price} BYN</div>
                        <div class="product-strength">${p.strength ? `💪 ${p.strength}` : (p.ohms ? `⚡ от ${p.ohms[0]}` : '')}</div>
                    </div>
                </div>
            `).join('');
        }
        function openProductModal(id) {
            currentProduct = products.find(p => p.id === id);
            if (!currentProduct) return;
            currentQty = 1;
            let modalImg = document.getElementById('modalImg');
            if (currentProduct.img && currentProduct.img !== "") {
                modalImg.innerHTML = `<img src="${currentProduct.img}" alt="${currentProduct.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='${currentProduct.emoji}'">`;
            } else {
                modalImg.innerHTML = `<span style="font-size:70px">${currentProduct.emoji}</span>`;
            }
            document.getElementById('modalTitle').innerHTML = `${currentProduct.brand} — ${currentProduct.name}`;
            document.getElementById('modalPrice').innerHTML = `${currentProduct.price} BYN`;
            document.getElementById('modalStrength').innerHTML = currentProduct.strength ? `💪 Крепость: ${currentProduct.strength}` : '';
            document.getElementById('qtyValue').innerText = currentQty;
            let flavorSelect = document.getElementById('flavorSelect');
            let ohmSelect = document.getElementById('ohmSelect');
            if (currentProduct.category === "coils" && currentProduct.ohms) {
                flavorSelect.style.display = 'none';
                ohmSelect.style.display = 'block';
                ohmSelect.innerHTML = '<option value="">Выберите сопротивление (Ω)</option>' + currentProduct.ohms.map(o => `<option value="${o}">${o}</option>`).join('');
            } else if (currentProduct.flavors && currentProduct.flavors.length > 0) {
                ohmSelect.style.display = 'none';
                flavorSelect.style.display = 'block';
                flavorSelect.innerHTML = '<option value="">Выберите вкус</option>' + currentProduct.flavors.map(f => `<option value="${f}">${f}</option>`).join('');
            } else {
                flavorSelect.style.display = 'none';
                ohmSelect.style.display = 'none';
            }
            document.getElementById('productModal').classList.add('active');
        }
        function showPage(page) {
            document.getElementById('catalogPage').classList.add('hidden');
            document.getElementById('cartPage').classList.add('hidden');
            document.getElementById('profilePage').classList.add('hidden');
            document.getElementById(`${page}Page`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(btn => { btn.classList.remove('active'); if (btn.dataset.page === page) btn.classList.add('active'); });
            if (page === 'profile') loadUserStats();
        }
        // ГЛАВНАЯ ФУНКЦИЯ ОФОРМЛЕНИЯ ЗАКАЗА — ИСПРАВЛЕНА
        function checkout() {
            if (cart.length === 0) { alert('Корзина пуста!'); return; }
            let total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let orderItems = cart.map(i => `${i.brand} ${i.name} (${i.selectedOption}) x${i.qty} = ${i.price * i.qty} BYN`).join('\n');
            let orderText = `🆕 НОВЫЙ ЗАКАЗ ARCHAD SHOP\n━━━━━━━━━━━━━━━━\n👤 ${userData.name}\n🆔 ID: ${userData.id}\n\n📦 ТОВАРЫ:\n${orderItems}\n━━━━━━━━━━━━━━━━\n💰 ИТОГО: ${total} BYN\n🚚 Доставка: 11:00-21:00`;
            const BOT_TOKEN = "8946537004:AAGqZiirco4qn8DWgGY-mlLdooO1W_LGhqk";
            const SELLER_ID = "8173700385";
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: SELLER_ID, text: orderText })
            }).then(res => res.json()).then(data => {
                if (data.ok) {
                    alert('✅ Заказ отправлен! Продавец свяжется с вами.');
                    cart = [];
                    saveCart();
                    showPage('catalog');
                } else {
                    alert('❌ Ошибка: ' + data.description);
                }
            }).catch(e => { console.error(e); alert('❌ Ошибка отправки. Попробуйте позже.'); });
        }
        function createSpark() {
            let s = document.createElement('div'); s.className = 'spark';
            s.style.left = Math.random() * innerWidth + 'px';
            s.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
        setInterval(() => { for (let i = 0; i < 3; i++) createSpark(); }, 500);
        const dailyTexts = ["🔥 OGGO CHERRY 20mg — хит продаж! 🔥", "⭐ DUALL EXTRA — 13 вкусов! ⭐", "💀 АНАРХИЯ 70mg — новинка! 💀", "❄️ ЗЛАЯ МОНАШКА Ice — ледяной удар! ❄️", "⚡ XROS картриджи — выбор Ом! ⚡"];
        let idx = 0;
        setInterval(() => { idx = (idx + 1) % dailyTexts.length; document.getElementById('dailyLiquid').innerText = dailyTexts[idx]; }, 10000);
        window.openProductModal = openProductModal;
        window.removeFromCart = removeFromCart;
        document.getElementById('decQty').onclick = () => { if (currentQty > 1) { currentQty--; document.getElementById('qtyValue').innerText = currentQty; } };
        document.getElementById('incQty').onclick = () => { currentQty++; document.getElementById('qtyValue').innerText = currentQty; };
        document.getElementById('addToCartBtn').onclick = () => { if (currentProduct) { let flavor = document.getElementById('flavorSelect').value; let ohm = document.getElementById('ohmSelect').value; if (currentProduct.category === "coils") { addToCart(currentProduct, currentQty, null, ohm); } else { addToCart(currentProduct, currentQty, flavor, null); } } };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('productModal').classList.remove('active');
        document.getElementById('cartIcon').onclick = () => showPage('cart');
        document.getElementById('checkoutBtn').onclick = checkout;
        document.getElementById('clearCartBtn').onclick = clearCart;
        document.querySelectorAll('.nav-item').forEach(btn => btn.onclick = () => showPage(btn.dataset.page));
        document.querySelectorAll('.sub-cat-btn').forEach(btn => btn.onclick = () => { currentSubCategory = btn.dataset.cat; renderCatalog(); document.querySelectorAll('.sub-cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); });
        renderCatalog();
        loadCart();
        loadUserStats();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
